      padding: 0;

    }

      background-color: #0a0a0a;
      color: #ededed;
      min-height: 100vh;
    }

    header {

      padding: 1.5rem 2rem;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }

    .logo-brief {
      color: #ededed;
    }

    .logo-cast {
      color: #3b82f6;
    }

    .header-stats {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.25rem;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      border-bottom: 1px solid #1a1a1a;
      flex-wrap: wrap;
    }

    .section-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid #262626;
      background: transparent;
      color: #999;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .section-btn:hover {
      border-color: #404040;
      color: #ededed;
    }

    .section-btn.active {
      color: #0a0a0a;
      font-weight: 600;
    }

    .section-btn[data-section="all"].active {
      background: #ededed;
      border-color: #ededed;
    }

    .section-btn[data-section="global"].active {
      background: #f59e0b;
      border-color: #f59e0b;
    }

    .section-btn[data-section="czech"].active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .section-btn[data-section="dobris"].active {
      background: #22c55e;
      border-color: #22c55e;
    }

    .section-btn[data-section="tech"].active {
      background: #a855f7;
      border-color: #a855f7;
      color: #fff;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    .section-group {
      margin-bottom: 2.5rem;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.25rem 0.625rem;
      border-radius: 4px;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .section-label.global {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
    }

    .section-label.czech {
      background: rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .section-label.dobris {
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
    }

    .section-label.tech {
      background: rgba(168, 85, 247, 0.15);
      color: #a855f7;
    }

    .cards {
      display: grid;
      gap: 1px;
      background: #1a1a1a;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }

    .card {
      background: #0a0a0a;
      padding: 1.25rem 1.5rem;
      transition: background 0.15s;
    }

    .card:hover {
      background: #111;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    .card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.0625rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .bias-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.625rem;
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .bias-neutral { background: #1c2a1c; color: #4ade80; }
    .bias-liberal { background: #1c2a3a; color: #60a5fa; }
    .bias-conservative { background: #2a1c1c; color: #f87171; }
    .bias-critical { background: #2a2a1c; color: #facc15; }
    .bias-analytical { background: #1c1c2a; color: #a78bfa; }
    .bias-sensational { background: #2a1c2a; color: #f472b6; }

    .card-summary {
      font-size: 0.875rem;
      color: #999;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    .coverage-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .coverage-bar {
      display: flex;
      gap: 3px;
    }

    .coverage-sq {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #1a1a1a;
    }

    .coverage-sq.filled-low { background: #555; }
    .coverage-sq.filled-mid { background: #f59e0b; }
    .coverage-sq.filled-high { background: #ef4444; }

    .coverage-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      color: #555;
    }

    .perspective {
      background: #111;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      border-left: 2px solid #333;
    }

    .perspective-toggle {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .perspective-toggle:hover {
      color: #999;
    }

    .perspective-text {
      font-size: 0.8125rem;
      color: #888;
      line-height: 1.5;
      margin-top: 0.5rem;
      display: none;
    }

    .perspective-text.open {
      display: block;
    }

    .card-sources {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.5rem;
    }

    .source-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      background: #141414;
      border: 1px solid #222;
      color: #777;
      text-decoration: none;
      transition: all 0.15s;
    }

    .source-tag:hover {
      border-color: #3b82f6;
      color: #3b82f6;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #555;
    }

    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: #666;
    }

    .empty-state p {
      font-size: 0.875rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6875rem;
      color: #333;
      border-top: 1px solid #1a1a1a;
    }

    @media (max-width: 640px) {
      header { padding: 1rem; }
      .logo { font-size: 1.5rem; }
      nav { padding: 0.75rem 1rem; gap: 0.375rem; }
      main { padding: 1.5rem 0.75rem; }
      .card { padding: 1rem 1.125rem; }
      .card h3 { font-size: 0.9375rem; }
    }

        summary: "Saronic closed a $1.75 billion Series D round led by Kleiner Perkins, more than doubling its valuation to $9.25 billion. The Austin-based company plans to build over 20 autonomous naval vessels per year by 2027, expanding shipyard capacity in Louisiana and Texas. Saronic holds a $392 million Navy contract and is investing $300 million in its Franklin, Louisiana facility.",
        sources: [
          { name: "CNBC", url: "https://www.cnbc.com/2026/03/31/autonomous-boat-startup-saronic-raises-1point75-billion-.html" },
          { name: "TechStartups", url: "https://techstartups.com/2026/03/31/autonomous-ship-startup-saronic-raises-1-75b-at-9-25b-valuation-to-scale-ai-powered-naval-fleet-for-u-s-military/" },
          { name: "Fast Company", url: "https://www.fastcompany.com/91503485/saronic-most-innovative-companies-2026" },
          { name: "Defense Daily", url: "https://www.defensedaily.com/autonomous-vessel-developer-saronic-raises-1-8-billion-to-accelerate-production-add-capacity/business-financial/" }
        ],
        bias: "Analytical",
        perspective: "CNBC focuses on the funding mechanics and military demand driving the raise. TechStartups emphasizes the AI-powered autonomy angle. Fast Company profiles Saronic's broader vision for maritime innovation. Defense Daily covers the Pentagon's push for cheaper, unmanned naval capabilities amid the Iran conflict."
      }
    ];
    // ============================================================
    // END NEWS DATA
    // ============================================================

    const SECTION_META = {
      global: { emoji: "🌍", label: "Global", color: "#f59e0b" },
      czech:  { emoji: "🇨🇿", label: "Czech", color: "#3b82f6" },
      dobris: { emoji: "📍", label: "Dobříš", color: "#22c55e" },
      tech:   { emoji: "🤖", label: "AI & Tech", color: "#a855f7" }
    };

    let activeSection = "all";

    function init() {
      renderNav();
      renderStats();
      renderNews();
    }

    function renderNav() {
      const nav = document.getElementById("sectionNav");
      let html = `<button class="section-btn ${activeSection === 'all' ? 'active' : ''}" data-section="all" onclick="setSection('all')">All</button>`;
      for (const [key, meta] of Object.entries(SECTION_META)) {
        html += `<button class="section-btn ${activeSection === key ? 'active' : ''}" data-section="${key}" onclick="setSection('${key}')">${meta.emoji} ${meta.label}</button>`;
      }
      nav.innerHTML = html;
    }

    function renderStats() {
      const el = document.getElementById("headerStats");
      const totalStories = NEWS_DATA.length;
      const totalRefs = NEWS_DATA.reduce((sum, s) => sum + s.sources.length, 0);
      const date = new Date(NEWS_UPDATED);
      const formatted = date.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
      el.textContent = `${formatted} · ${totalStories} stories · ${totalRefs} source refs`;
    }

    function setSection(s) {
      activeSection = s;
      renderNav();
      renderNews();
    }

    function renderNews() {
      const main = document.getElementById("main");
      const sections = activeSection === "all"
        ? Object.keys(SECTION_META)
        : [activeSection];

      let html = "";
      for (const sec of sections) {
        const meta = SECTION_META[sec];
        const stories = NEWS_DATA.filter(s => s.section === sec);
        if (stories.length === 0) continue;

        html += `<div class="section-group">`;
        html += `<span class="section-label ${sec}">${meta.emoji} ${meta.label}</span>`;
        html += `<div class="cards">`;

        for (const story of stories) {
          const coverageCount = story.sources.length;
          html += renderCard(story, coverageCount);
        }

        html += `</div></div>`;
      }

      if (!html) {
        html = `<div class="empty-state"><h3>No stories available</h3><p>Check back after the next update.</p></div>`;
      }

      main.innerHTML = html;
    }

    function renderCard(story, coverageCount) {
      const biasClass = "bias-" + story.bias.toLowerCase();

      // Coverage squares
      let squares = "";
      for (let i = 0; i < 6; i++) {
        if (i < coverageCount) {
          const cls = coverageCount >= 5 ? "filled-high" : coverageCount >= 3 ? "filled-mid" : "filled-low";
          squares += `<div class="coverage-sq ${cls}"></div>`;
        } else {
          squares += `<div class="coverage-sq"></div>`;
        }
      }

      const coverageText = coverageCount >= 5 ? "major" : coverageCount >= 3 ? "notable" : "minor";

      // Source tags
      const sourceTags = story.sources.map(s =>
        `<a class="source-tag" href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`
      ).join("");

      const pid = "p-" + Math.random().toString(36).slice(2, 8);

      return `
        <article class="card">
          <div class="card-top">
            <h3>${story.headline}</h3>
            <span class="bias-badge ${biasClass}">${story.bias}</span>
          </div>
          <p class="card-summary">${story.summary}</p>
          <div class="coverage-row">
            <div class="coverage-bar">${squares}</div>
            <span class="coverage-label">${coverageCount} sources · ${coverageText}</span>
          </div>
          <div class="perspective">
            <button class="perspective-toggle" onclick="togglePerspective('${pid}', this)">
              <span>◎</span> Perspective Analysis
            </button>
            <p class="perspective-text" id="${pid}">${story.perspective}</p>
          </div>
          <div class="card-sources">${sourceTags}</div>
        </article>`;
    }

    function togglePerspective(id, btn) {
      const el = document.getElementById(id);
      el.classList.toggle("open");
    }

    init();
  </script>
</body>
</html>
